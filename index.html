<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Hub</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #111, #2b2b2b);
      color: #fff;
      padding: 32px 24px;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .hero p {
      margin: 0;
      color: #d9d9d9;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .card p {
      margin: 0 0 18px;
      color: #555;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.92;
    }

    .footer {
      margin-top: 24px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 26px;
      }

      .wrap {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Site Hub</h1>
      <p>Access live registers, inductions, sign in records and site tools from one place.</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Induction Register</h2>
        <p>View the live induction register in a cleaner page with quick access back to the hub.</p>
        <a class="btn" href="inductions.html">Open Register</a>
      </div>

    <div class="footer">
      Live site access hub
    </div>
  </div>
</body>
</html>
