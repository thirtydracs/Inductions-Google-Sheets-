<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Induction Register</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 6px;
      font-size: 42px;
      line-height: 1.05;
    }

    .title p {
      margin: 0;
      color: #6b7280;
      font-size: 18px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-dark {
      background: #111111;
      color: #ffffff;
    }

    .panel {
      background: #ffffff;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .panel-head p {
      margin: 4px 0 0;
      color: #6b7280;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search-row input {
      flex: 1 1 320px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      outline: none;
    }

    .meta {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: #fff;
    }

    thead th {
      background: #111827;
      color: #fff;
      text-align: left;
      padding: 14px 14px;
      font-size: 14px;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 14px;
      border-top: 1px solid #e5e7eb;
      font-size: 15px;
      vertical-align: top;
    }

    tbody tr:nth-child(even) {
      background: #f9fafb;
    }

    .empty {
      padding: 20px;
      color: #6b7280;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
    }

    .loading {
      padding: 24px;
      color: #6b7280;
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 14px;
      }

      .title h1 {
        font-size: 32px;
      }

      .title p {
        font-size: 16px;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Induction Register</h1>
        <p>Clean live register view</p>
      </div>

      <div class="actions">
        <a class="btn btn-light" href="index.html">← Back to Hub</a>
        <a
          class="btn btn-dark"
          href="https://docs.google.com/spreadsheets/d/e/2PACX-1vRT9SYjuRCNvmZDbM0SRjP5xQz9mrm7NVbVzXabep8t0JCNFISYo6x4c41qrJO83XWnYvoBj7LjDE2D/pubhtml"
          target="_blank"
        >
          Open Full Register
        </a>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>Live Register</h2>
          <p>Showing published sheet data in your own UI</p>
        </div>
        <span class="tag">Live CSV View</span>
      </div>

      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search by name, company, mobile or email" />
      </div>

      <div class="meta" id="metaText">Loading register...</div>

      <div class="table-wrap">
        <div id="tableContainer" class="loading">Loading data...</div>
      </div>
    </div>
  </div>

  <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRT9SYjuRCNvmZDbM0SRjP5xQz9mrm7NVbVzXabep8t0JCNFISYo6x4c41qrJO83XWnYvoBj7LjDE2D/pub?gid=0&single=true&output=csv";

    const searchInput = document.getElementById("searchInput");
    const tableContainer = document.getElementById("tableContainer");
    const metaText = document.getElementById("metaText");

    let allRows = [];
    let headers = [];

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell.trim());
          if (row.some(item => item !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length || row.length) {
        row.push(cell.trim());
        if (row.some(item => item !== "")) rows.push(row);
      }

      return rows;
    }

    function cleanRows(rows) {
      if (!rows.length) return { headers: [], data: [] };

      const rawHeaders = rows[0].map(h => h.trim());
      const data = rows.slice(1).filter(row =>
        row.some(cell => String(cell || "").trim() !== "")
      );

      return {
        headers: rawHeaders,
        data
      };
    }

    function renderTable(filteredRows) {
      if (!headers.length) {
        tableContainer.innerHTML = '<div class="empty">No headers found.</div>';
        return;
      }

      if (!filteredRows.length) {
        tableContainer.innerHTML = '<div class="empty">No matching results.</div>';
        return;
      }

      const visibleColumns = headers
        .map((header, index) => ({ header, index }))
        .filter(col => col.header && col.header !== "");

      let html = "<table><thead><tr>";
      visibleColumns.forEach(col => {
        html += `<th>${escapeHtml(col.header)}</th>`;
      });
      html += "</tr></thead><tbody>";

      filteredRows.forEach(row => {
        html += "<tr>";
        visibleColumns.forEach(col => {
          const value = row[col.index] || "";
          html += `<td>${escapeHtml(value)}</td>`;
        });
        html += "</tr>";
      });

      html += "</tbody></table>";
      tableContainer.innerHTML = html;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function applyFilter() {
      const q = searchInput.value.trim().toLowerCase();

      const filtered = allRows.filter(row =>
        row.some(cell => String(cell || "").toLowerCase().includes(q))
      );

      metaText.textContent = `${filtered.length} record${filtered.length === 1 ? "" : "s"} shown`;
      renderTable(filtered);
    }

    fetch(csvUrl)
      .then(response => response.text())
      .then(text => {
        const parsed = parseCSV(text);
        const cleaned = cleanRows(parsed);

        headers = cleaned.headers;
        allRows = cleaned.data;

        metaText.textContent = `${allRows.length} records loaded`;
        renderTable(allRows);
      })
      .catch(() => {
        metaText.textContent = "Could not load register data";
        tableContainer.innerHTML = '<div class="empty">Failed to load the published CSV.</div>';
      });

    searchInput.addEventListener("input", applyFilter);
  </script>
</body>
</html>
