<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Induction Register</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .title p {
      margin: 0;
      color: #666;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-light {
      background: #e9ecef;
      color: #111;
    }

    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 78vh;
      border: 0;
      border-radius: 12px;
      background: #fff;
    }

    @media (max-width: 700px) {
      .title h1 {
        font-size: 24px;
      }

      iframe {
        height: 72vh;
      }

      .wrap {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Induction Register</h1>
        <p>Live published register view</p>
      </div>

      <div class="actions">
        <a class="btn btn-light" href="index.html">← Back to Hub</a>
        <a class="btn" href="https://docs.google.com/spreadsheets/d/e/2PACX-1vRT9SYjuRCNvmZDbM0SRjP5xQz9mrm7NVbVzXabep8t0JCNFISYo6x4c41qrJO83XWnYvoBj7LjDE2D/pubhtml" target="_blank">Open Full Register</a>
      </div>
    </div>

    <div class="panel">
      <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRT9SYjuRCNvmZDbM0SRjP5xQz9mrm7NVbVzXabep8t0JCNFISYo6x4c41qrJO83XWnYvoBj7LjDE2D/pubhtml"></iframe>
    </div>
  </div>
</body>
</html>
